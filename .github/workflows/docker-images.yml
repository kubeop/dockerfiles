name: Build Docker Image

on:
  schedule:
    - cron: "0 0 * * 6"
  push:
    branches:
      - main
    paths:
      - 'library/**'
      - '.github/workflows/docker-images.yml'

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      os_images: ${{ steps.set-matrix.outputs.os_images }}
      base_images: ${{ steps.set-matrix.outputs.base_images }}
      app_images: ${{ steps.set-matrix.outputs.app_images }}
      python_images: ${{ steps.set-matrix.outputs.python_images }}
      python_app_images: ${{ steps.set-matrix.outputs.python_app_images }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Generate matrix from library dirs
      id: set-matrix
      run: |
        python3 - <<'PY'
        import json, os

        categories = {
          'os_images': ['alpine', 'debian', 'ubuntu'],
          'base_images': ['golang', 'openjdk', 'docker', 'buildkit', 'kubectl', 'kubedog', 'nginx', 'nodejs'],
          'app_images': ['jenkins', 'maven', 'gradle', 'tomcat'],
          'python_images': ['python'],
          'python_app_images': ['ansible'],
        }

        args_map = {
          'openjdk': ['jdk', 'jre'],
          'buildkit': ['cli'],
          'maven': ['java8', 'java11', 'java17', 'java21', 'java25'],
          'gradle': ['java8', 'java11', 'java17', 'java21', 'java25'],
        }

        output = {}
        for output_name, names in categories.items():
          matrix = []
          for name in names:
            path = os.path.join('library', name)
            if not os.path.isdir(path):
              raise SystemExit(f'missing library dir: {path}')
            tags = sorted([
              d for d in os.listdir(path)
              if os.path.isdir(os.path.join(path, d))
            ])
            if not tags:
              raise SystemExit(f'no tags found for {name}')
            for tag in tags:
              if name in args_map:
                for arg in args_map[name]:
                  matrix.append({'name': name, 'tag': tag, 'args': arg})
              else:
                matrix.append({'name': name, 'tag': tag, 'args': ''})
          output[output_name] = matrix

        for key, value in output.items():
          print(f'{key}<<EOF')
          print(json.dumps(value, ensure_ascii=False))
          print('EOF')
        PY >> $GITHUB_OUTPUT

  build-os-images:
    needs:
      - prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        images: ${{ fromJson(needs.prepare-matrix.outputs.os_images) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DKH_USERNAME }}
        password: ${{ secrets.DKH_PASSWORD }}

    - name: Login to ACR
      uses: docker/login-action@v4
      with:
        registry: registry.cn-hangzhou.aliyuncs.com
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Set args
      run: |
        if [[ "${{ matrix.images.args }}" != "" ]]; then
            echo "tag=${{ matrix.images.tag }}-${{ matrix.images.args }}" >> $GITHUB_ENV
            echo "file=Dockerfile.${{ matrix.images.args }}" >> $GITHUB_ENV
        else
            echo "tag=${{ matrix.images.tag }}" >> $GITHUB_ENV
            echo "file=Dockerfile" >> $GITHUB_ENV
        fi

    - name: Build and Push images
      uses: docker/build-push-action@v7
      with:
        platforms: linux/amd64,linux/arm64
        context: library/${{ matrix.images.name }}/${{ matrix.images.tag }}
        file: library/${{ matrix.images.name }}/${{ matrix.images.tag }}/${{ env.file }}
        push: true
        tags: |
          kubeop/${{ matrix.images.name }}:${{ env.tag }}
          registry.cn-hangzhou.aliyuncs.com/kubeop/${{ matrix.images.name }}:${{ env.tag }}
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: kubeop/${{ matrix.images.name }}:${{ env.tag }}
        severity: "CRITICAL,HIGH"

  build-base-images:
    needs:
      - prepare-matrix
      - build-os-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        images: ${{ fromJson(needs.prepare-matrix.outputs.base_images) }}

    steps:
    - name: Checkout
